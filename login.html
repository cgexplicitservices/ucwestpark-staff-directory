<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — UC Westpark Staff Directory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito Sans',sans-serif;background:#1A2A4A;min-height:100vh;}
:root{
  --blue:#2B5BAD;--blue-mid:#1E4A8F;--blue-light:#EEF3FF;
  --gold:#E8A830;
  --dark:#1A2A4A;
  --ink:#1A2A4A;--ink-mid:#3A4A6A;--ink-muted:#7A8AAA;
  --border:#D4DDF0;--bg:#F5F8FF;
  --font-heading:'Libre Baskerville',Georgia,serif;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-out-quart:cubic-bezier(0.25,1,0.5,1);
}

/* ══ SPLIT LAYOUT ══ */
.layout{display:grid;grid-template-columns:420px 1fr;min-height:100vh;}

/* ── BRAND PANEL ── */
.brand-panel{
  background:var(--dark);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:56px 48px;
  animation:panel-in 0.7s var(--ease-out-expo) both;
}
@keyframes panel-in{from{opacity:0;}to{opacity:1;}}
.brand-panel::before{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
  width:520px;height:520px;
  background:radial-gradient(circle,rgba(43,91,173,0.28) 0%,transparent 65%);
  top:-180px;left:-140px;filter:blur(48px);
  animation:orb-a 22s ease-in-out infinite alternate;
}
.brand-panel::after{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(232,168,48,0.14) 0%,transparent 65%);
  bottom:-100px;right:-80px;filter:blur(44px);
  animation:orb-b 28s ease-in-out infinite alternate;
}
@keyframes orb-a{from{transform:translate(0,0) scale(1);}to{transform:translate(50px,35px) scale(1.12);}}
@keyframes orb-b{from{transform:translate(0,0) scale(1);}to{transform:translate(-40px,-30px) scale(1.08);}}
.brand-inner{position:relative;z-index:1;text-align:center;animation:brand-rise 0.65s var(--ease-out-expo) 0.1s both;}
@keyframes brand-rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.brand-logo{
  width:96px;height:96px;background:white;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  box-shadow:0 8px 32px rgba(0,0,0,0.28);
  overflow:hidden;padding:10px;
}
.brand-logo img{width:100%;height:100%;object-fit:contain;}
.brand-logo-fallback{font-family:var(--font-heading);font-size:22px;font-weight:700;color:var(--blue);}
.brand-name{font-family:var(--font-heading);font-size:28px;font-weight:700;color:white;margin-bottom:4px;letter-spacing:0.3px;}
.brand-product{font-size:11px;font-weight:600;color:rgba(255,255,255,0.42);text-transform:uppercase;letter-spacing:2px;margin-bottom:36px;}
.brand-rule{width:36px;height:2px;background:var(--gold);border-radius:2px;margin:0 auto 28px;}
.brand-tagline{font-size:14px;line-height:1.8;color:rgba(255,255,255,0.62);max-width:250px;margin:0 auto;}
.brand-footer{position:absolute;bottom:28px;z-index:1;font-size:11px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase;}

/* ── FORM PANEL ── */
.form-panel{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:40px 24px;min-height:100vh;}

/* ── CARD ── */
.card{
  background:white;border-radius:20px;
  box-shadow:0 4px 32px rgba(43,91,173,0.12),0 1px 4px rgba(0,0,0,0.06);
  width:100%;max-width:420px;overflow:hidden;
  animation:card-rise 0.55s var(--ease-out-expo) 0.15s both;
}
@keyframes card-rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.form-header{padding:44px 40px 32px;text-align:center;border-bottom:1.5px solid #EEF3FF;}
.lock-icon{
  width:68px;height:68px;background:var(--blue-light);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:30px;
  animation:icon-breathe 3.5s ease-in-out infinite;
}
@keyframes icon-breathe{
  0%,100%{box-shadow:0 0 0 0 rgba(43,91,173,0);}
  50%{box-shadow:0 0 0 10px rgba(43,91,173,0.08);}
}
.card-title{font-family:var(--font-heading);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.card-sub{font-size:13.5px;color:var(--ink-muted);line-height:1.5;}
.card-body{padding:32px 40px 40px;}

/* ── FIELDS ── */
.field-group{margin-bottom:22px;}
.field-label{font-size:12px;font-weight:700;color:var(--ink-mid);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px;display:block;}
.field-wrap{position:relative;}
.field-input{
  width:100%;padding:13px 44px 13px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--ink);
  background:white;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.field-input.no-icon{padding-right:16px;}
.field-input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(43,91,173,0.10);}
.field-input.input-error{border-color:#e53935;background:#fff5f5;}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--ink-muted);padding:4px;transition:color 0.15s;}
.toggle-pw:hover{color:var(--ink-mid);}

/* ── MESSAGES ── */
.error-msg{font-size:12px;color:#c62828;margin-top:10px;font-weight:600;padding:10px 12px;background:#fde8e8;border-radius:8px;display:none;}
.error-msg.show{display:block;animation:msg-in 0.22s var(--ease-out-expo);}
@keyframes msg-in{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}

/* ── BUTTON ── */
.btn-submit{
  width:100%;background:var(--blue);color:white;border:none;
  padding:15px;border-radius:10px;font-size:15px;font-weight:700;
  font-family:'Nunito Sans',sans-serif;cursor:pointer;margin-top:4px;
  transition:background 0.15s,transform 0.1s,box-shadow 0.15s;
  letter-spacing:0.5px;position:relative;overflow:hidden;text-transform:uppercase;
}
.btn-submit:not(:disabled):hover{background:var(--blue-mid);transform:translateY(-1px);box-shadow:0 6px 20px rgba(43,91,173,0.32);}
.btn-submit:not(:disabled):active{transform:translateY(0) scale(0.98);box-shadow:none;}
.btn-submit:disabled{background:#A0B8E0;cursor:not-allowed;}
.btn-submit.loading{background:#A0B8E0;cursor:not-allowed;}
.btn-submit.loading::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.35) 50%,transparent 100%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;
}
@keyframes shimmer{from{background-position:200% center;}to{background-position:-200% center;}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .brand-panel{flex-direction:row;padding:0 20px;height:64px;justify-content:flex-start;gap:12px;animation:none;}
  .brand-panel::before,.brand-panel::after{display:none;}
  .brand-inner{display:flex;align-items:center;gap:10px;animation:none;}
  .brand-logo{width:38px;height:38px;border-radius:10px;margin:0;box-shadow:none;padding:4px;}
  .brand-logo-fallback{font-size:12px;}
  .brand-name{font-size:16px;margin-bottom:0;}
  .brand-product,.brand-rule,.brand-tagline,.brand-footer{display:none;}
  .form-panel{padding:24px 16px 40px;min-height:calc(100vh - 64px);align-items:flex-start;padding-top:32px;}
  .form-header{padding:32px 24px 24px;}
  .card-body{padding:24px 24px 32px;}
}
@media(prefers-reduced-motion:reduce){
  *,::before,::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}
</style>
</head>
<body>

<div class="layout">

  <!-- BRAND PANEL -->
  <aside class="brand-panel">
    <div class="brand-inner">
      <div class="brand-logo">
        <img src="UC_west_park_Logo-PNG.png" alt="UC Westpark" onerror="this.outerHTML='<div class=brand-logo-fallback>UCW</div>'">
      </div>
      <div class="brand-name">UC Westpark</div>
      <div class="brand-product">Staff Directory</div>
      <div class="brand-rule"></div>
      <p class="brand-tagline">Every team member, verified and on record.</p>
    </div>
    <div class="brand-footer">Admin access only</div>
  </aside>

  <!-- FORM PANEL -->
  <main class="form-panel">
    <div class="card">

      <div class="form-header">
        <div class="lock-icon">🔑</div>
        <div class="card-title">Admin Sign In</div>
        <div class="card-sub">UC Westpark Staff Directory</div>
      </div>

      <div class="card-body">
        <div class="field-group">
          <label class="field-label" for="login-email">Email Address</label>
          <input class="field-input no-icon" type="email" id="login-email"
                 placeholder="admin@ucwestpark.com"
                 onkeydown="if(event.key==='Enter')login()">
        </div>
        <div class="field-group">
          <label class="field-label" for="login-pw">Password</label>
          <div class="field-wrap">
            <input class="field-input" type="password" id="login-pw"
                   placeholder="Enter your password"
                   onkeydown="if(event.key==='Enter')login()">
            <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>
        <div class="error-msg" id="login-error" role="alert"></div>
        <button class="btn-submit" id="btn-login" onclick="login()">Sign In →</button>
      </div>

    </div>
  </main>

</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://lamvjvhypgzpthtmzvsf.supabase.co',
  'sb_publishable_6S_J4hYUXliw3aEc8YCSag_PwW6iaKd'
);

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.replace('index.html');
});

function togglePw() {
  const el = document.getElementById('login-pw');
  const btn = document.querySelector('.toggle-pw');
  const isText = el.type === 'text';
  el.type = isText ? 'password' : 'text';
  btn.textContent = isText ? '👁' : '🙈';
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  document.getElementById('login-pw').classList.add('input-error');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('login-pw').classList.remove('input-error');
  if (!email || !pw) { showErr('Please enter your email and password.'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.classList.add('loading'); btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.classList.remove('loading'); btn.textContent = 'Sign In →';
  if (error) { showErr('Incorrect email or password.'); return; }
  window.location.replace('index.html');
}
</script>
</body>
</html>
